type ProtocolDailyStat @entity {
  id: ID!
  date: String! @index
  timestamp: DateTime! @index
  rateUSD: BigInt!
  supply: BigInt!
  earningTvl: BigInt! # TVL of the product, including fees.
  tvl: BigInt!
  yield: BigInt! # Yield generated, including fees.
  revenue: BigInt! # Fees generated.
  apy: Float!
  meta: JSON!
}

type ProtocolDailyStatDetail @entity {
  id: ID!
  date: String! @index
  productId: String! @index # Format: `chainId:symbol` (e.g. `1:OETH`)
  product: String! @index
  timestamp: DateTime! @index
  rateUSD: BigInt!
  supply: BigInt!
  earningTvl: BigInt!
  tvl: BigInt!
  yield: BigInt! # Yield generated by the product, including fees.
  revenue: BigInt! # Fees generated by the product.
  apy: Float!
  inheritedTvl: BigInt! # TVL of the product that is inherited from another product.
  inheritedYield: BigInt! # Yield of the product that is inherited from another product.
  inheritedRevenue: BigInt! # Fees of the product that is inherited from another product.
  bridgedTvl: BigInt! # TVL of the product that is bridged from another product.
}

type ProtocolDailyRevenue @entity {
  id: ID!
  date: String! @index
  timestamp: DateTime! @index
  totalEth: BigInt!
  totalUsd: BigInt!
  avg7Eth: BigInt!
  avg14Eth: BigInt!
  avg30Eth: BigInt!
  avg7Usd: BigInt!
  avg14Usd: BigInt!
  avg30Usd: BigInt!
  split: JSON!
}

type ProtocolDailyTvl @entity {
  id: ID!
  date: String! @index
  timestamp: DateTime! @index
  totalEth: BigInt!
  totalUsd: BigInt!
  avg7Eth: BigInt!
  avg14Eth: BigInt!
  avg30Eth: BigInt!
  avg7Usd: BigInt!
  avg14Usd: BigInt!
  avg30Usd: BigInt!
  split: JSON!
}

type ProtocolDailyTokenSupply @entity {
  id: ID!
  date: String! @index
  timestamp: DateTime! @index
  totalEth: BigInt!
  totalUsd: BigInt!
  avg7Eth: BigInt!
  avg14Eth: BigInt!
  avg30Eth: BigInt!
  avg7Usd: BigInt!
  avg14Usd: BigInt!
  avg30Usd: BigInt!
  split: JSON!
}
